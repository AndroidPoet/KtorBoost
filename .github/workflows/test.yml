name: Run Tests
on:
  push:
    branches:
      - main
      - feature/ci_support
  pull_request:

jobs:
  desktop-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Run ktor-boost desktop tests
        shell: bash
        run: ./gradlew :ktor-boost:desktopTest
