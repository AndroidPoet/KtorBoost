name: Publish

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Publish and release to Maven Central
        run: |
          modules=(
            ktor-boost
            ktor-realtime
            ktor-realtime-websocket
            ktor-realtime-sse
            ktor-realtime-reverb
            ktor-realtime-socketio
            ktor-realtime-stomp
            ktor-realtime-graphql
            ktor-realtime-mqtt
            ktor-realtime-rsocket
            ktor-realtime-longpolling
          )
          for module in "${modules[@]}"; do
            ./gradlew -DLibrariesOnly=true ":${module}:publishAndReleaseToMavenCentral" --no-configuration-cache
          done
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME || secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD || secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID || secrets.SIGNING_IN_MEMORY_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY || secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD || secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
